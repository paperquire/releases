name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Clone source from CodeCommit
        shell: bash
        run: |
          git config --global credential."https://git-codecommit.us-east-1.amazonaws.com".helper '!aws codecommit credential-helper $@'
          git config --global credential."https://git-codecommit.us-east-1.amazonaws.com".UseHttpPath true
          git clone https://git-codecommit.us-east-1.amazonaws.com/v1/repos/paperquire source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: source/paperquire
        run: npm ci

      - name: Build app
        working-directory: source/paperquire
        run: npx electron-vite build

      - name: Package Windows installer
        working-directory: source/paperquire
        run: npx electron-builder --win --x64 --publish never

      - name: List build artifacts
        working-directory: source/paperquire/release
        run: dir

      - name: Upload to GitHub Release
        working-directory: source/paperquire/release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ inputs.version }}" *.exe latest.yml --repo paperquire/releases --clobber
